name: Build VCV Rack Plugin

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'          # triggers a release when you push a version tag like v2.0.0
  pull_request:
    branches: [main]

env:
  rack-sdk-version: latest
  rack-plugin-toolchain-dir: /home/build/rack-plugin-toolchain

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Stamp the plugin version with git short-sha on non-release builds
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  modify-plugin-version:
    name: Stamp plugin version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      - name: Append git sha to version (non-tag builds only)
        if: "! startsWith(github.ref, 'refs/tags/v')"
        run: |
          gitrev=$(git rev-parse --short HEAD)
          pluginversion=$(jq -r '.version' plugin.json)
          echo "Stamping version: $pluginversion → $pluginversion-$gitrev"
          jq --arg V "$pluginversion-$gitrev" '.version=$V' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json

# ─────────────────────────────────────────────────────────────────────────────
# Job 2 — Build for Windows x64 and Linux x64 (via Docker toolchain)
# ─────────────────────────────────────────────────────────────────────────────
  build-win-lin:
    name: Build (${{ matrix.platform }})
    needs: modify-plugin-version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        platform: [win-x64, lin-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      # Download cpp-httplib before the Rack toolchain compiles sources
      - name: Download cpp-httplib dependency
        run: make dep

      - name: Build plugin (${{ matrix.platform }})
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.rack-plugin-toolchain-dir }}
          make plugin-build-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: ${{ env.rack-plugin-toolchain-dir }}/plugin-build

# ─────────────────────────────────────────────────────────────────────────────
# Job 3 — Build for macOS x64 and ARM64 (native runners)
# ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build (mac-${{ matrix.platform }})
    needs: modify-plugin-version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/cache@v4
        id: plugin-version-cache
        with:
          path: plugin.json
          key: ${{ github.sha }}-${{ github.run_id }}

      - name: Install build tools
        run: brew install curl wget

      - name: Download Rack SDK
        run: |
          cd $HOME
          wget -O Rack-SDK.zip \
            "https://vcvrack.com/downloads/Rack-SDK-${{ env.rack-sdk-version }}-mac-x64+arm64.zip"
          unzip -q Rack-SDK.zip

      - name: Download cpp-httplib dependency
        run: make dep

      - name: Build plugin (mac-${{ matrix.platform }})
        run: |
          CROSS_COMPILE_TARGET_x64=x86_64-apple-darwin
          CROSS_COMPILE_TARGET_arm64=arm64-apple-darwin
          export RACK_DIR=$HOME/Rack-SDK
          export CROSS_COMPILE=CROSS_COMPILE_TARGET_${{ matrix.platform }}
          export CROSS_COMPILE=${!CROSS_COMPILE}
          make dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.platform }}
          path: dist/*.vcvplugin

# ─────────────────────────────────────────────────────────────────────────────
# Job 4 — Publish GitHub Release (only on version tags like v2.0.0)
# ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-win-lin, build-mac]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify plugin.json version matches tag
        run: |
          pluginversion=$(jq -r '.version' plugin.json)
          tagversion="${GITHUB_REF_NAME#v}"
          if [ "$pluginversion" != "$tagversion" ]; then
            echo "ERROR: plugin.json version ($pluginversion) doesn't match tag ($tagversion)"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: vcv-rack-mcp-server ${{ github.ref_name }}
          body: |
            ## vcv-rack-mcp-server ${{ github.ref_name }}

            VCV Rack 2 plugin: exposes Rack internals to AI clients (Claude, Cursor, etc.) via HTTP/MCP.

            ### Installation
            Download the `.vcvplugin` for your platform and double-click, or place it in your Rack plugins folder.

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          draft: false
          prerelease: false
          files: _artifacts/**/*.vcvplugin
